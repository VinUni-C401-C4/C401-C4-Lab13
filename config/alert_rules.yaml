alerts:
  - name: high_latency_p95
    severity: P2
    condition: latency_p95_ms > 3000 for 10m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-high-latency-p95
    slo_ref: latency_p95_ms
    notify:
      - dashboard
      - oncall-channel
  - name: high_error_rate
    severity: P1
    condition: error_rate_pct > 2 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-high-error-rate
    slo_ref: error_rate_pct
    notify:
      - dashboard
      - oncall-channel
      - paging
  - name: cost_budget_spike
    severity: P2
    condition: hourly_cost_usd > 2x_baseline for 15m
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#3-cost-budget-spike
    slo_ref: daily_cost_usd
    notify:
      - dashboard
      - finops-channel
  - name: quality_score_drop
    severity: P2
    condition: quality_score_avg < 0.80 for 15m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#4-quality-score-drop
    slo_ref: quality_score_avg
    notify:
      - dashboard
      - oncall-channel

metadata:
  default_evaluation_interval: 1m
  default_no_data_behavior: keep_last_state
  annotation_template: "{{name}} breached {{condition}}"
